<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500">
  <rect width="1600" height="500" fill="#111827"/>

  <!-- Subtle grid -->
  <g stroke="#374151" stroke-width="0.5" opacity="0.25">
    <line x1="0" y1="100" x2="1600" y2="100"/><line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="300" x2="1600" y2="300"/><line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/><line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/><line x1="1200" y1="0" x2="1200" y2="500"/>
    <line x1="1400" y1="0" x2="1400" y2="500"/>
  </g>

  <!-- Dashed connection lines -->
  <g stroke="#6ee7b7" stroke-width="1" opacity="0.15" stroke-dasharray="6,4">
    <line x1="100" y1="70" x2="320" y2="55"/><line x1="320" y1="55" x2="560" y2="80"/>
    <line x1="900" y1="60" x2="1100" y2="75"/><line x1="1100" y1="75" x2="1350" y2="55"/>
    <line x1="100" y1="340" x2="350" y2="370"/><line x1="350" y1="370" x2="600" y2="350"/>
    <line x1="900" y1="370" x2="1150" y2="350"/><line x1="1150" y1="350" x2="1400" y2="380"/>
  </g>

  <!-- Semi-transparent center overlay for text readability -->
  <rect x="220" y="60" width="1160" height="340" rx="8" fill="#111827" opacity="0.55"/>

  <!-- === TOP ROW === -->

  <!-- K8s helm wheel — top left -->
  <g transform="translate(100,70)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#326ce5" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="11" fill="none" stroke="#326ce5" stroke-width="2.5"/>
    <line x1="0" y1="-11" x2="0" y2="-32" stroke="#326ce5" stroke-width="2.5"/>
    <line x1="10" y1="-5" x2="29" y2="-14" stroke="#326ce5" stroke-width="2.5"/>
    <line x1="10" y1="5" x2="29" y2="14" stroke="#326ce5" stroke-width="2.5"/>
    <line x1="0" y1="11" x2="0" y2="32" stroke="#326ce5" stroke-width="2.5"/>
    <line x1="-10" y1="5" x2="-29" y2="14" stroke="#326ce5" stroke-width="2.5"/>
    <line x1="-10" y1="-5" x2="-29" y2="-14" stroke="#326ce5" stroke-width="2.5"/>
    <circle cx="0" cy="-32" r="4.5" fill="#326ce5" opacity="0.4"/>
    <circle cx="29" cy="-14" r="4.5" fill="#326ce5" opacity="0.4"/>
    <circle cx="29" cy="14" r="4.5" fill="#326ce5" opacity="0.4"/>
    <circle cx="0" cy="32" r="4.5" fill="#326ce5" opacity="0.4"/>
    <circle cx="-29" cy="14" r="4.5" fill="#326ce5" opacity="0.4"/>
    <circle cx="-29" cy="-14" r="4.5" fill="#326ce5" opacity="0.4"/>
  </g>

  <!-- Terraform — top center-left -->
  <g transform="translate(320,55)">
    <polygon points="-16,-18 -2,-11 -2,5 -16,-2" fill="#7b42bc" opacity="0.7"/>
    <polygon points="0,-11 14,-18 14,-2 0,5" fill="#7b42bc" opacity="0.7"/>
    <polygon points="0,8 14,1 14,17 0,24" fill="#7b42bc" opacity="0.7"/>
  </g>

  <!-- AWS Cloud — top center -->
  <g transform="translate(560,75)">
    <path d="M-30,8 Q-38,-12 -18,-18 Q-6,-30 12,-22 Q26,-26 32,-11 Q40,0 32,11 L-30,11 Q-38,8 -30,8 Z" fill="none" stroke="#ff9900" stroke-width="2.5"/>
    <text x="-12" y="4" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ff9900" opacity="0.8">AWS</text>
  </g>

  <!-- Ansible — top center-right -->
  <g transform="translate(1100,75)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#ee0000" stroke-width="2.5"/>
    <text x="-7" y="7" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#ee0000" opacity="0.7">A</text>
  </g>

  <!-- Docker — top right -->
  <g transform="translate(1350,55)">
    <path d="M-30,4 Q-30,16 0,16 Q32,16 32,4" fill="none" stroke="#2496ed" stroke-width="2.5"/>
    <rect x="-24" y="-8" width="12" height="9" rx="1.5" fill="none" stroke="#2496ed" stroke-width="2"/>
    <rect x="-10" y="-8" width="12" height="9" rx="1.5" fill="none" stroke="#2496ed" stroke-width="2"/>
    <rect x="4" y="-8" width="12" height="9" rx="1.5" fill="none" stroke="#2496ed" stroke-width="2"/>
    <rect x="-10" y="-19" width="12" height="9" rx="1.5" fill="none" stroke="#2496ed" stroke-width="2"/>
    <rect x="4" y="-19" width="12" height="9" rx="1.5" fill="none" stroke="#2496ed" stroke-width="2"/>
    <path d="M-30,4 Q-36,-4 -32,-12" fill="none" stroke="#2496ed" stroke-width="2"/>
  </g>

  <!-- Gear — far top right -->
  <g transform="translate(1520,65)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <line x1="0" y1="-16" x2="0" y2="-22" stroke="#fbbf24" stroke-width="2"/><line x1="0" y1="16" x2="0" y2="22" stroke="#fbbf24" stroke-width="2"/>
    <line x1="-16" y1="0" x2="-22" y2="0" stroke="#fbbf24" stroke-width="2"/><line x1="16" y1="0" x2="22" y2="0" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="0" cy="-22" r="2.5" fill="#fbbf24" opacity="0.5"/><circle cx="0" cy="22" r="2.5" fill="#fbbf24" opacity="0.5"/>
    <circle cx="-22" cy="0" r="2.5" fill="#fbbf24" opacity="0.5"/><circle cx="22" cy="0" r="2.5" fill="#fbbf24" opacity="0.5"/>
  </g>

  <!-- CI/CD — top area -->
  <g transform="translate(900,55)">
    <circle cx="0" cy="0" r="9" fill="none" stroke="#34d399" stroke-width="2"/>
    <line x1="9" y1="0" x2="19" y2="0" stroke="#34d399" stroke-width="2"/>
    <polygon points="19,0 15,-3 15,3" fill="#34d399"/>
    <circle cx="28" cy="0" r="9" fill="none" stroke="#34d399" stroke-width="2"/>
    <line x1="37" y1="0" x2="47" y2="0" stroke="#34d399" stroke-width="2"/>
    <polygon points="47,0 43,-3 43,3" fill="#34d399"/>
    <circle cx="56" cy="0" r="9" fill="none" stroke="#34d399" stroke-width="2"/>
  </g>

  <!-- === BOTTOM ROW === -->

  <!-- Database — bottom left -->
  <g transform="translate(100,350)">
    <ellipse cx="0" cy="-18" rx="24" ry="9" fill="none" stroke="#c4b5fd" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
    <ellipse cx="0" cy="18" rx="24" ry="9" fill="none" stroke="#c4b5fd" stroke-width="2.5"/>
    <line x1="-24" y1="-18" x2="-24" y2="18" stroke="#c4b5fd" stroke-width="2.5"/>
    <line x1="24" y1="-18" x2="24" y2="18" stroke="#c4b5fd" stroke-width="2.5"/>
  </g>

  <!-- Grafana — bottom center-left -->
  <g transform="translate(350,370)">
    <rect x="-32" y="-18" width="64" height="36" rx="3" fill="none" stroke="#f46800" stroke-width="2"/>
    <line x1="-32" y1="-9" x2="32" y2="-9" stroke="#f46800" stroke-width="1.5" opacity="0.5"/>
    <polyline points="-22,8 -12,-4 -2,3 8,-12 18,-2 26,-6" fill="none" stroke="#f46800" stroke-width="2.5"/>
  </g>

  <!-- Terminal — bottom center -->
  <g transform="translate(600,355)">
    <rect x="-30" y="-18" width="60" height="40" rx="3" fill="none" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="-30" y1="-9" x2="30" y2="-9" stroke="#e2e8f0" stroke-width="1.5" opacity="0.4"/>
    <polyline points="-18,0 -9,7 -18,14" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <line x1="-3" y1="14" x2="14" y2="14" stroke="#e2e8f0" stroke-width="2"/>
  </g>

  <!-- User icon — bottom center-right -->
  <g transform="translate(900,370)">
    <circle cx="0" cy="-12" r="11" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    <path d="M-18,14 a18,14 0 0,1 36,0" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  </g>

  <!-- Printer — bottom right -->
  <g transform="translate(1150,355)">
    <rect x="-12" y="-22" width="24" height="12" rx="1" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <rect x="-18" y="-12" width="36" height="18" rx="3" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <rect x="-12" y="4" width="24" height="14" rx="1" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <line x1="-6" y1="10" x2="6" y2="10" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="-6" y1="14" x2="3" y2="14" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="12" cy="-3" r="2" fill="#34d399"/>
  </g>

  <!-- Mouse — bottom far right -->
  <g transform="translate(1400,380)">
    <rect x="-10" y="-16" width="20" height="32" rx="10" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <line x1="0" y1="-16" x2="0" y2="-5" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="0" cy="-7" r="2" fill="#94a3b8" opacity="0.6"/>
  </g>

  <!-- Prometheus — bottom far right -->
  <g transform="translate(1520,370)">
    <polygon points="0,-20 18,12 -18,12" fill="none" stroke="#e6522c" stroke-width="2.5"/>
    <circle cx="0" cy="2" r="5" fill="none" stroke="#e6522c" stroke-width="2"/>
  </g>
</svg>
